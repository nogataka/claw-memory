name: Release

# Publish @nogataka/claw-memory to npm when a version tag is pushed.
#   git tag v0.1.1 && git push origin v0.1.1
# Requires repository secret NPM_TOKEN (npm granular automation token).

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Verify package.json version matches the tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${REF_NAME#v}"
          echo "package.json=$PKG tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::version mismatch (package.json=$PKG, tag=$TAG)"
            exit 1
          fi
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
